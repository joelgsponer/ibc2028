<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>IBC 2028 Basel — XXXIV International Biometric Conference</title>
  <meta name="description" content="IBC 2028 — XXXIV International Biometric Conference, 16–21 July 2028, Congress Centre Basel, Switzerland.">
  <style>
    :root { --teal:#207f8f; --teal-dark:#1a6b78; --ink:#16323a; --paper:#f4f1ea; }
    * { box-sizing: border-box; }
    html, body { margin:0; padding:0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: var(--ink); background: var(--paper); line-height: 1.5;
    }
    header {
      background: var(--teal); color:#fff; text-align:center;
      padding: 28px 20px 24px;
    }
    header h1 { margin:0; font-size: clamp(1.6rem, 6vw, 2.4rem); letter-spacing:.5px; }
    header p { margin:.5rem 0 0; font-size: clamp(.9rem, 3.4vw, 1.05rem); opacity:.95; }
    main { max-width: 920px; margin: 0 auto; padding: 22px 16px 56px; }
    .flyer {
      display:block; width:100%; height:auto; border-radius:10px;
      box-shadow: 0 6px 24px rgba(0,0,0,.18); background:#fff;
    }
    .actions { display:flex; flex-wrap:wrap; gap:12px; justify-content:center; margin: 22px 0 8px; }
    .btn {
      display:inline-flex; align-items:center; gap:8px;
      padding: 12px 20px; border-radius: 999px; font-weight:600; font-size:1rem;
      text-decoration:none; border:2px solid var(--teal); transition: transform .05s ease;
    }
    .btn:active { transform: translateY(1px); }
    .btn-primary { background: var(--teal); color:#fff; }
    .btn-primary:hover { background: var(--teal-dark); border-color: var(--teal-dark); }
    .btn-outline { background:#fff; color: var(--teal); }
    .btn-outline:hover { background: #eef6f7; }
    .cal { margin-top: 26px; text-align:center; }
    .cal h2 { font-size: 1.05rem; margin: 0 0 12px; color: var(--ink); }
    .cal .actions { margin-top: 0; }
    .cal .btn { padding: 10px 18px; font-size: .95rem; }
    footer { text-align:center; color:#6b7b80; font-size:.8rem; padding: 0 16px 40px; }
    footer a { color:#6b7b80; }
  </style>
</head>
<body>
  <header>
    <h1>IBC 2028 Basel</h1>
    <p>XXXIV International Biometric Conference · 16–21 July 2028 · Congress Centre Basel</p>
  </header>

  <main>
    <img class="flyer" src="FLYER_IBC2028_QR.png"
         alt="IBC 2028 Basel conference flyer — International Biometric Conference, 16–21 July 2028, Messe and Congress Center Basel.">

    <div class="actions">
      <a class="btn btn-primary" href="FLYER_IBC2028_QR.png" download>⬇ Download flyer</a>
    </div>

    <section class="cal">
      <h2>Add to your calendar</h2>

        <a class="btn btn-outline" href="ibc2028.ics" download>📅 Download .ics</a>

           href="https://calendar.google.com/calendar/render?action=TEMPLATE&text=IBC%202028%20%E2%80%94%20XXXIV%20International%20Biometric%20Conference&dates=20280716/20280722&details=The%20XXXIV%20International%20Biometric%20Conference%20%28IBC%202028%29%20brings%20the%20global%20biometrics%20and%20biostatistics%20community%20to%20Basel%2C%20Switzerland.%0A%0ADates%3A%2016%E2%80%9321%20July%202028%0AVenue%3A%20Congress%20Centre%20Basel%2C%20Messeplatz%2021%2C%204058%20Basel%2C%20Switzerland%0A%0AConference%20%26%20registration%3A%20https%3A//www.biometricsociety.org/events/event-description%3FCalendarEventKey%3Da703d218-7ac5-4c9a-ab1b-019bb0216116%26Home%3D%252Fevents%252Fcalendar%0AFlyer%3A%20https%3A//joelgsponer.github.io/ibc2028/&location=Congress%20Centre%20Basel%2C%20Messeplatz%2021%2C%204058%20Basel%2C%20Switzerland">Google Calendar</a>
        <a class="btn btn-outline" target="_blank" rel="noopener"
           href="https://outlook.live.com/calendar/0/deeplink/compose?path=/calendar/action/compose&rru=addevent&allday=true&startdt=2028-07-16&enddt=2028-07-22&subject=IBC%202028%20%E2%80%94%20XXXIV%20International%20Biometric%20Conference&location=Congress%20Centre%20Basel%2C%20Messeplatz%2021%2C%204058%20Basel%2C%20Switzerland&body=The%20XXXIV%20International%20Biometric%20Conference%20%28IBC%202028%29%20brings%20the%20global%20biometrics%20and%20biostatistics%20community%20to%20Basel%2C%20Switzerland.%0A%0ADates%3A%2016%E2%80%9321%20July%202028%0AVenue%3A%20Congress%20Centre%20Basel%2C%20Messeplatz%2021%2C%204058%20Basel%2C%20Switzerland%0A%0AConference%20%26%20registration%3A%20https%3A//www.biometricsociety.org/events/event-description%3FCalendarEventKey%3Da703d218-7ac5-4c9a-ab1b-019bb0216116%26Home%3D%252Fevents%252Fcalendar%0AFlyer%3A%20https%3A//joelgsponer.github.io/ibc2028/">Outlook</a>
      </div>
    </section>
  </main>

  <footer>
    <p>Congress Centre Basel, Messeplatz 21, 4058 Basel, Switzerland ·
       <a href="https://www.ibc-roes.org" target="_blank" rel="noopener">ibc-roes.org</a></p>
  </footer>
